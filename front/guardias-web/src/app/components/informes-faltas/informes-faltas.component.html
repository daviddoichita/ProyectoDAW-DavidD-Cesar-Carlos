<div class="app-layout">
    <app-header></app-header>
    <div class="main-section">
        <div class="flex justify-content-between align-items-center mb-4">
            <div class="flex align-items-center w-full max-w-20rem">
                <span class="p-input-icon-right w-full">
                    <input pInputText type="text" [(ngModel)]="valorBusqueda" (input)="buscador()"
                        placeholder="Buscador"
                        class="p-inputtext-lg border-round-lg border-1 surface-border px-3 py-2 shadow-2" />
                    <i class="pi pi-search text-xl mr-7"></i>
                </span>
            </div>
        </div>

        <p-table #table [value]="filtrarProfesores" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [paginator]="true"
            class="text-lg w-9" [rowHover]="true" [styleClass]="'custom-table'">
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-2xl bg-gray-300 text-center">Fecha</th>
                    <th class="text-2xl bg-gray-300 text-center">Hora</th>
                    <th class="text-2xl bg-gray-300 text-center">Nombre</th>
                    <th class="text-2xl bg-gray-300 text-center">Apellidos</th>
                    <th class="text-2xl bg-gray-300 text-center">Grupo</th>
                    <th class="text-2xl bg-gray-300 text-center">Aula</th>
                    <th class="text-2xl bg-gray-300 text-center">Información faltas</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-profesor>
                <tr>
                    <td class="text-2xl bg-gray-300 text-center">{{profesor.fecha}}</td>
                    <td class="text-2xl bg-gray-300 text-center">{{profesor.hora}}</td>
                    <td class="text-2xl bg-gray-300 text-center">{{profesor.nombre}}</td>
                    <td class="text-2xl bg-gray-300 text-center">{{profesor.apellidos}}</td>
                    <td class="text-2xl bg-gray-300 text-center">{{profesor.grupo}}</td>
                    <td class="text-2xl bg-gray-300 text-center">{{profesor.aula}}</td>
                    <td class="text-2xl bg-gray-300 text-center">
                        <button class="btn btn-primary" (click)="verFaltas(profesor)">Ver faltas</button>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="8" class="text-center text-2xl">
                        No hay ninguna falta.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
